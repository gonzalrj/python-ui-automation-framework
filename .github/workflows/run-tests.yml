name: Run UI Tests

on:
  workflow_dispatch:
    inputs:
      framework:
        description: "Test framework to run"
        required: true
        default: "both"
        type: choice
        options:
          - both
          - selenium
          - playwright

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            chromium-browser chromium-chromedriver \
            libnss3 libgbm1 libatk-bridge2.0-0 libgtk-3-0 libasound2 \
            default-jre-headless nodejs npm
          # Symlink to paths expected by conftest.py
          [ -f /usr/bin/chromium ] || sudo ln -s /usr/bin/chromium-browser /usr/bin/chromium
          [ -f /usr/bin/chromedriver ] || \
            sudo ln -s "$(find /usr -name chromedriver 2>/dev/null | head -1)" /usr/bin/chromedriver

      - name: Install Allure CLI
        run: npm install -g allure-commandline

      - name: Install Python dependencies
        run: |
          pip install -r requirements/common.txt
          if [[ "${{ inputs.framework }}" == "selenium" || "${{ inputs.framework }}" == "both" ]]; then
            pip install -r requirements/selenium.txt
          fi
          if [[ "${{ inputs.framework }}" == "playwright" || "${{ inputs.framework }}" == "both" ]]; then
            pip install -r requirements/playwright.txt
            playwright install chromium
          fi

      - name: Run tests
        continue-on-error: true
        run: |
          case "${{ inputs.framework }}" in
            selenium)   TEST_PATH="tests/selenium" ;;
            playwright) TEST_PATH="tests/playwright" ;;
            *)          TEST_PATH="tests" ;;
          esac
          pytest "$TEST_PATH" --alluredir=allure-results || echo "Some tests failed"

      - name: Generate Allure report
        run: allure generate allure-results --clean -o allure-report

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

      - name: Write report link to job summary
        run: |
          {
            echo "## Test Report"
            echo ""
            echo "**Framework:** \`${{ inputs.framework }}\`"
            echo ""
            echo ":bar_chart: [View Allure Report](${{ steps.deploy.outputs.page_url }})"
          } >> "$GITHUB_STEP_SUMMARY"
