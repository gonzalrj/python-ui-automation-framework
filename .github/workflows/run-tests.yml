name: Run UI Tests

on:
  workflow_dispatch:
    inputs:
      framework:
        description: "Test framework to run"
        required: true
        default: "both"
        type: choice
        options:
          - both
          - selenium
          - playwright
      base_url:
        description: "Base URL for tests (leave blank to use default: https://www.saucedemo.com/)"
        required: false
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run tests in devcontainer
        uses: devcontainers/ci@v0.3
        with:
          runCmd: |
            PYTEST_ARGS="tests --alluredir=allure-results"
            if [[ "${{ inputs.framework }}" != "both" ]]; then
              PYTEST_ARGS="$PYTEST_ARGS -k ${{ inputs.framework }}"
            fi
            if [[ -n "${{ inputs.base_url }}" ]]; then
              PYTEST_ARGS="$PYTEST_ARGS --base-url=${{ inputs.base_url }}"
            fi
            pytest $PYTEST_ARGS || true
            allure generate allure-results --clean -o allure-report

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

      - name: Write report link to job summary
        run: |
          {
            echo "## Test Report"
            echo ""
            echo "**Framework:** \`${{ inputs.framework }}\`"
            echo ""
            echo ":bar_chart: [View Allure Report](${{ steps.deploy.outputs.page_url }})"
          } >> "$GITHUB_STEP_SUMMARY"
